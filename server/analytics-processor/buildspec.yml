version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 327444422515.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Java application...
      - mvn clean package -DskipTests
      - echo Building the Docker image...
      - docker build -t analytics-processor .
      - docker tag analytics-processor:latest 327444422515.dkr.ecr.us-east-1.amazonaws.com/analytics-processor:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push 327444422515.dkr.ecr.us-east-1.amazonaws.com/analytics-processor:latest
