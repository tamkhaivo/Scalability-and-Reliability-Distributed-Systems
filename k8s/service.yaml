apiVersion: v1
kind: Service
metadata:
  name: dashboard-ingestion-service
  namespace: default
  labels:
    app: dashboard-ingestion
  annotations:
    # This provisions an AWS Network Load Balancer (NLB) rather than a Classic Load Balancer
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: dashboard-ingestion
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
